<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#2d4a5c"/>
  <rect x="80" y="80" width="920" height="970" fill="none" stroke="#f5ede0" stroke-width="1.5" opacity="0.25"/>

  <!-- Top label centered -->
