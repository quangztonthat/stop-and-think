<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <filter id="grain02" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="9"/>
      <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.45  0 0 0 0 0.30  0 0 0 0.045 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1080" height="1350" fill="#f5ede0"/>
  <rect x="80" y="80" width="920" height="1190" fill="none" stroke="#1a1410" stroke-width="1.5" opacity="0.18"/>

  <!-- Top mono label -->
  <text x="540" y="180" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" font-weight="500" fill="#8b3a2b" letter-spacing="6">PROFILE · 2026</text>

  <!-- Decorative line top -->
  <line x1="490" y1="210" x2="590" y2="210" stroke="#c4923c" stroke-width="2"/>

  <!-- "Tôi là" small italic -->
  <text x="540" y="330" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="48" font-weight="400" font-style="italic" fill="#4a3f33">Tôi là</text>

  <!-- Big name -->
  <text x="540" y="475" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="130" font-weight="500" fill="#1a1410">Quang Ton<tspan fill="#8b3a2b">.</tspan></text>

  <!-- Three actions -->
  <text font-family="Fraunces, Georgia, serif" font-size="80" font-weight="400" fill="#4a3f33">
    <tspan x="540" y="635" text-anchor="middle">Đọc sách.</tspan>
    <tspan x="540" y="745" text-anchor="middle" fill="#8b3a2b" font-style="italic" font-weight="500">Suy nghĩ.</tspan>
    <tspan x="540" y="855" text-anchor="middle">Viết lại.</tspan>
  </text>

  <!-- Decorative line -->
  <line x1="490" y1="935" x2="590" y2="935" stroke="#c4923c" stroke-width="2"/>

  <!-- Brand block -->
  <text x="540" y="1010" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="34" font-weight="500" font-style="italic" fill="#1a1410">Stop &amp; Think</text>
  <text x="540" y="1055" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" font-weight="500" fill="#4a3f33" letter-spacing="4">12 CUỐN PHÂN TÍCH SÂU</text>

  <!-- Bottom info -->
  <text x="540" y="1170" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#4a3f33" letter-spacing="3">TƯ VẤN TÀI CHÍNH · SÀI GÒN</text>
  <text x="540" y="1220" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#8b3a2b" letter-spacing="3">STOPANDTHINK.PAGES.DEV</text>
</svg>
