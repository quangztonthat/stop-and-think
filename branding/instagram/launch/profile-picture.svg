<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <!-- Subtle paper texture via stipple noise -->
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.45  0 0 0 0 0.30  0 0 0 0.045 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Cream bg -->
  <rect width="320" height="320" fill="#f5ede0"/>
  <!-- Paper grain overlay -->
  <rect width="320" height="320" fill="#1a1410" filter="url(#paper)" opacity="0.5"/>

  <!-- Stamp-style outer ring -->
  <circle cx="160" cy="160" r="138" fill="none" stroke="#1a1410" stroke-width="1.5" opacity="0.18"/>
  <circle cx="160" cy="160" r="132" fill="none" stroke="#1a1410" stroke-width="0.5" opacity="0.4"/>

  <!-- Curved top text "STOP &amp; THINK" -->
  <defs>
    <path id="topArc" d="M 70 160 A 90 90 0 0 1 250 160" fill="none"/>
  </defs>
  <text font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#5e2418" letter-spacing="6">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">STOP · THINK</textPath>
  </text>

  <!-- Massive serif ampersand — focal mark -->
  <text x="160" y="222"
        text-anchor="middle"
        font-family="Fraunces, Georgia, serif"
        font-size="190"
        font-weight="400"
        font-style="italic"
        fill="#8b3a2b">&amp;</text>

  <!-- Bottom decorative bar -->
  <line x1="120" y1="248" x2="200" y2="248" stroke="#c4923c" stroke-width="2"/>

  <!-- Bottom small text -->
  <text x="160" y="272"
        text-anchor="middle"
        font-family="JetBrains Mono, monospace"
        font-size="9"
        font-weight="500"
        fill="#4a3f33"
        letter-spacing="3">EST · MMXXVI</text>
</svg>
