<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f5ede0"/>

  <!-- Decorative circle top right -->
  <circle cx="1080" cy="80" r="200" fill="#8b3a2b" opacity="0.08"/>

  <!-- Decorative line -->
  <line x1="80" y1="160" x2="200" y2="160" stroke="#1a1410" stroke-width="2"/>

  <!-- Label -->
  <text x="80" y="200" font-family="Georgia, serif" font-size="14" font-weight="500" fill="#6b5d4f" letter-spacing="3">THƯ VIỆN · BY ANH BẢY</text>

  <!-- Brand title -->
  <text x="80" y="320" font-family="Georgia, serif" font-size="120" font-weight="700" fill="#1a1410">Stop</text>
  <text x="290" y="320" font-family="Georgia, serif" font-size="120" font-weight="300" fill="#8b3a2b" font-style="italic">&amp;</text>
  <text x="80" y="450" font-family="Georgia, serif" font-size="120" font-weight="400" fill="#2d4a5c" font-style="italic">think.</text>

  <!-- Subtitle -->
  <text x="80" y="520" font-family="Georgia, serif" font-size="28" font-weight="300" fill="#6b5d4f">Một thư viện những cuốn sách buộc ta dừng lại —</text>
  <text x="80" y="560" font-family="Georgia, serif" font-size="28" font-weight="300" fill="#6b5d4f">không phải để biết thêm, mà để nghĩ lại.</text>

  <!-- URL footer -->
  <text x="80" y="600" font-family="monospace" font-size="14" fill="#1a1410" letter-spacing="2">STOP-AND-THINK.PAGES.DEV</text>
</svg>
